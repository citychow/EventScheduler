<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wembley Stadium — Weekly Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div>
    <div class="masthead-title">Wembley <span>Stadium</span></div>
    <div class="masthead-sub">Weekly Event Monitor — London, HA9 0WS</div>
  </div>
  <div class="masthead-meta">
    <div class="last-run">Last schedule check<strong id="last-run-time">—</strong></div>
  </div>
</div>

<div class="ticker-bar">
  <span class="ticker-inner" id="ticker-text">Loading schedule...</span>
</div>

<div class="controls-bar">
  <div class="week-nav">
    <button class="btn" onclick="changeWeek(-1)">← Prev</button>
    <div class="week-display" id="week-display">—</div>
    <button class="btn" onclick="changeWeek(1)">Next →</button>
  </div>
  <button class="btn primary" id="check-btn" onclick="runCheck()">Export Current</button>
  <button class="btn" id="export-btn" onclick="fetchEvents()">Export ALL</button>
  <div class="status-pill idle" id="status-pill">Idle</div>
</div>

<div class="summary-strip" id="summary-strip">
  <div class="stat-cell"><div class="stat-num" id="s-total">—</div><div class="stat-label">Events this week</div></div>
  <div class="stat-cell"><div class="stat-num" id="s-football">—</div><div class="stat-label">Football</div></div>
  <div class="stat-cell"><div class="stat-num" id="s-concert">—</div><div class="stat-label">Concerts</div></div>
  <div class="stat-cell"><div class="stat-num" id="s-other">—</div><div class="stat-label">Other</div></div>
  <div class="stat-cell"><div class="stat-num accent" id="s-next">—</div><div class="stat-label">Next event in</div></div>
</div>

<div class="schedule-section">
  <div class="section-heading" id="schedule-heading">Weekly schedule</div>
  <div id="schedule-list"></div>
</div>

<div class="exports-section">
  <div class="section-heading">Export log</div>
  <div id="export-log"></div>
</div>

<footer>
  <div>Wembley Stadium Weekly Monitor</div>
  <!-- <div> &nbsp;/&nbsp; Auto-refreshes every Friday at 14:00</div> -->
  <div><span>Source:</span> TicketMaster API &nbsp;·&nbsp; <span>Built with</span> Claude</div>
</footer>

<script src="index.js"></script>
</body>
</html>
